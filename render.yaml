services:
  - type: web
    name: biblioteca-digital
    env: docker
    plan: free # Can be changed to a paid plan if needed
    region: ohio # Adjust to your preference
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biblioteca-db
          property: connectionString
      - key: PORT
        value: 10000
      # Any other environment variables your app needs
      # - key: REDIS_URL
      #   value: ...

databases:
  - name: biblioteca-db
    databaseName: biblioteca_digital
    user: admin
